<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081B15"/>
      <stop offset="100%" style="stop-color:#0F3D2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8A964"/>
      <stop offset="50%" style="stop-color:#dfc07a"/>
      <stop offset="100%" style="stop-color:#C8A964"/>
    </linearGradient>
    <pattern id="chevrons" x="0" y="0" width="50" height="30" patternUnits="userSpaceOnUse">
      <polyline points="5,24 25,6 45,24" stroke="rgba(200,169,100,0.06)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#chevrons)"/>
  <!-- Left accent -->
  <rect x="80" y="80" width="3" height="470" fill="url(#gold)" opacity="0.5"/>
  <!-- Logo mark -->
  <polyline points="120,195 158,155 196,195" stroke="#C8A964" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="127,210 158,178 189,210" stroke="#C8A964" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
  <!-- Wordmark -->
  <text x="120" y="256" font-family="Georgia,serif" font-size="36" font-weight="400" fill="#F5F1E6" letter-spacing="1">Withcent</text>
  <rect x="120" y="264" width="100" height="1" fill="#C8A964" opacity="0.6"/>
  <text x="122" y="280" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#C8A964" letter-spacing="7">GLOBAL</text>
  <!-- Divider -->
  <rect x="120" y="308" width="48" height="1.5" fill="url(#gold)"/>
  <!-- Headline -->
  <text x="120" y="395" font-family="Georgia,serif" font-size="68" font-weight="300" fill="#F5F1E6">Where <tspan font-style="italic" fill="#C8A964">ambition</tspan></text>
  <text x="120" y="475" font-family="Georgia,serif" font-size="68" font-weight="300" fill="#F5F1E6">meets <tspan font-style="italic" fill="#C8A964">admission.</tspan></text>
  <!-- Sub -->
  <text x="120" y="530" font-family="Arial,sans-serif" font-size="20" fill="#4d7060" letter-spacing="1">Contracted Education Advisor · UK · Canada · USA · Est. 2010</text>
  <!-- Bottom -->
  <rect x="0" y="596" width="1200" height="34" fill="rgba(200,169,100,0.04)"/>
  <text x="120" y="618" font-family="Arial,sans-serif" font-size="14" fill="#2d4f3d">wcent.vercel.app</text>
  <text x="1080" y="618" font-family="Arial,sans-serif" font-size="14" fill="#2d4f3d" text-anchor="end">withcentglobal.com</text>
</svg>
