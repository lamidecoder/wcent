<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#07101f"/>

  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(201,168,76,0.12)"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f5d980;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.12);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(7,16,31,0);stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow orb -->
  <ellipse cx="900" cy="200" rx="400" ry="350" fill="url(#glow)"/>

  <!-- Left gold accent bar -->
  <rect x="80" y="80" width="4" height="470" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- Logo box -->
  <rect x="120" y="100" width="72" height="72" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <rect x="170" y="150" width="18" height="18" fill="#c9a84c" opacity="0.55"/>
  <text x="156" y="155" font-family="Georgia, serif" font-size="46" font-weight="600" fill="#c9a84c">W</text>

  <!-- Brand name -->
  <text x="212" y="142" font-family="Georgia, serif" font-size="30" font-weight="400" fill="white" letter-spacing="2">Withcent</text>
  <text x="214" y="164" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#c9a84c" letter-spacing="6">NIGERIA</text>

  <!-- Divider line -->
  <rect x="120" y="210" width="44" height="2" fill="url(#goldGrad)"/>

  <!-- Main headline -->
  <text x="120" y="295" font-family="Georgia, serif" font-size="62" font-weight="300" fill="white">Your Gateway to</text>
  <text x="120" y="375" font-family="Georgia, serif" font-size="68" font-weight="400" fill="url(#goldGrad)" font-style="italic">World-Class Education</text>

  <!-- Subtext -->
  <text x="120" y="435" font-family="Arial, sans-serif" font-size="22" fill="#64748b">Contracted Education Advisor · UK · Canada · USA</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(201,168,76,0.06)"/>
  <text x="120" y="615" font-family="Arial, sans-serif" font-size="16" fill="#475569">wcent.vercel.app</text>
  <text x="1080" y="615" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="end">Est. 2010</text>

  <!-- Right side decorative element -->
  <rect x="1050" y="80" width="80" height="80" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>
  <rect x="1060" y="90" width="60" height="60" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>
  <text x="1090" y="140" font-family="Georgia, serif" font-size="42" font-weight="600" fill="rgba(201,168,76,0.2)" text-anchor="middle">W</text>

  <!-- Dots accent bottom right -->
  <circle cx="1100" cy="450" r="3" fill="#c9a84c" opacity="0.4"/>
  <circle cx="1120" cy="470" r="2" fill="#c9a84c" opacity="0.25"/>
  <circle cx="1140" cy="450" r="4" fill="#c9a84c" opacity="0.15"/>
  <circle cx="1100" cy="490" r="2" fill="#c9a84c" opacity="0.2"/>
  <circle cx="1150" cy="480" r="3" fill="#c9a84c" opacity="0.3"/>
</svg>
