<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background -->
  <rect width="32" height="32" fill="#07101f"/>
  <!-- Gold border -->
  <rect x="1.5" y="1.5" width="29" height="29" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  <!-- Gold dot accent bottom-right -->
  <rect x="24" y="24" width="5" height="5" fill="#c9a84c" opacity="0.7"/>
  <!-- W letter centered -->
  <text x="16" y="23" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#c9a84c" text-anchor="middle">W</text>
</svg>
